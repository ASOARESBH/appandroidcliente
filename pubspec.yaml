name: choppon_app
description: Aplicativo oficial de fidelidade e consumo para clientes da rede ChoppOn.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3

  # Local Storage
  shared_preferences: ^2.2.3

  # UI & Styling
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  mask_text_input_formatter: ^2.9.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  geolocator: ^12.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
